<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to SecureForce — Access your deployment dashboard, guard roster, and security reports.">
  <title>Sign In | SecureForce Security Agency</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M50 5 L88 22 L88 55 C88 74 71 88 50 96 C29 88 12 74 12 55 L12 22 Z' fill='%231A2B4A' stroke='%23C8973A' stroke-width='3'/%3E%3Cpath d='M36 52 L46 62 L67 38' stroke='%23C8973A' stroke-width='6' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-page" id="login-page">

  <!-- Top-right controls -->
  <div class="auth-top-icons" style="position:fixed;top:20px;right:20px;display:flex;gap:8px;z-index:100;">
    <button class="icon-btn dark-toggle" id="login-dark-toggle" title="Toggle Dark Mode" aria-label="Toggle dark mode"><i class="fas fa-moon"></i></button>
    <button class="icon-btn rtl-toggle" id="login-rtl-toggle" title="Toggle RTL" aria-label="Toggle RTL direction"><i class="fas fa-exchange-alt"></i></button>
  </div>

  <!-- Decorative background -->
  <div style="position:absolute;inset:0;pointer-events:none;overflow:hidden;">
    <div style="position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(26,43,74,0.25) 0%,transparent 70%);top:-200px;right:-200px;"></div>
    <div style="position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(200,151,58,0.12) 0%,transparent 70%);bottom:-150px;left:-150px;"></div>
    <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(200,151,58,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(200,151,58,0.04) 1px,transparent 1px);background-size:52px 52px;"></div>
    <!-- Floating icons -->
    <div style="position:absolute;top:12%;left:5%;opacity:0.12;animation:float 7s ease-in-out infinite;"><i class="fas fa-shield-alt" style="font-size:2.5rem;color:#fff;"></i></div>
    <div style="position:absolute;bottom:18%;right:6%;opacity:0.10;animation:float 9s ease-in-out infinite 2s;"><i class="fas fa-user-shield" style="font-size:3rem;color:var(--secondary);"></i></div>
    <div style="position:absolute;top:55%;left:7%;opacity:0.08;animation:float 6s ease-in-out infinite 1s;"><i class="fas fa-lock" style="font-size:1.8rem;color:#fff;"></i></div>
    <div style="position:absolute;top:25%;right:8%;opacity:0.07;animation:float 8s ease-in-out infinite 3s;"><i class="fas fa-certificate" style="font-size:2rem;color:var(--secondary);"></i></div>
  </div>

  <!-- Auth Card -->
  <div class="auth-card animate-on-scroll zoom-in" id="login-card">
    <!-- Logo -->
    <a href="index.html" class="auth-logo" id="login-logo" aria-label="SecureForce - Home">
      <svg width="36" height="36" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="loginGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#C8973A"/><stop offset="100%" stop-color="#DDB358"/></linearGradient></defs>
        <path d="M50 8 L86 24 L86 52 C86 70 70 84 50 92 C30 84 14 70 14 52 L14 24 Z" fill="url(#loginGrad)" fill-opacity="0.2" stroke="url(#loginGrad)" stroke-width="3" stroke-linejoin="round"/>
        <path d="M38 50 L46 58 L64 40" stroke="url(#loginGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="auth-logo-text">Secure<span>Force</span></span>
    </a>

    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Sign in to access your security dashboard</p>

    <form class="auth-form" id="login-form" onsubmit="event.preventDefault();window.location.href='index.html';">
      <div class="form-group">
        <label class="form-label" for="login-email">Email Address</label>
        <input type="email" id="login-email" class="form-input" placeholder="you@company.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="login-password" class="form-input" placeholder="Enter your password" required>
          <button type="button" class="toggle-password" aria-label="Toggle password visibility"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>
      <div class="auth-row">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:0.85rem;color:rgba(255,255,255,0.6);">
          <input type="checkbox" id="login-remember" style="accent-color:var(--secondary);"> Remember me
        </label>
        <a href="#" style="color:var(--secondary);font-size:0.85rem;font-weight:600;" id="login-forgot">Forgot Password?</a>
      </div>
      <button type="submit" class="btn btn-gold btn-full btn-shine" id="login-submit-btn" style="margin-bottom:4px;">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div class="auth-divider">or continue with</div>

    <div style="display:flex;flex-direction:column;gap:10px;">
      <!-- Google -->
      <button class="btn-social" id="login-google">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
      <!-- Apple -->
      <button class="btn-social" id="login-apple">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        Continue with Apple
      </button>
      <!-- LinkedIn -->
      <button class="btn-social" id="login-linkedin">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#0A66C2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        Continue with LinkedIn
      </button>
    </div>

    <p class="auth-footer-text">Don't have an account? <a href="signup.html" id="login-signup-link">Create one free</a></p>
  </div>
</div>

<style>
@keyframes float { 0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);} }
</style>
<script src="script.js"></script>
</body>
</html>
