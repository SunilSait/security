<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your SecureForce account — Join India's leading security manpower platform.">
  <title>Sign Up | SecureForce Security Agency</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M50 5 L88 22 L88 55 C88 74 71 88 50 96 C29 88 12 74 12 55 L12 22 Z' fill='%231A2B4A' stroke='%23C8973A' stroke-width='3'/%3E%3Cpath d='M36 52 L46 62 L67 38' stroke='%23C8973A' stroke-width='6' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-page" id="signup-page">

  <!-- Top-right controls -->
  <div class="auth-top-icons">
    <button class="icon-btn dark-toggle" id="signup-dark-toggle" title="Toggle Dark Mode" aria-label="Toggle dark mode"><i class="fas fa-moon"></i></button>
    <button class="icon-btn rtl-toggle" id="signup-rtl-toggle" title="Toggle RTL" aria-label="Toggle RTL direction"><i class="fas fa-exchange-alt"></i></button>
  </div>

  <!-- Decorative background -->
  <div style="position:absolute;inset:0;pointer-events:none;overflow:hidden;">
    <div style="position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(200,151,58,0.12) 0%,transparent 70%);top:-200px;left:-200px;"></div>
    <div style="position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(26,43,74,0.3) 0%,transparent 70%);bottom:-150px;right:-150px;"></div>
    <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(200,151,58,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(200,151,58,0.04) 1px,transparent 1px);background-size:52px 52px;"></div>
    <!-- Floating icons -->
    <div style="position:absolute;top:10%;right:5%;opacity:0.10;animation:float 7s ease-in-out infinite;"><i class="fas fa-check-circle" style="font-size:2.8rem;color:#fff;"></i></div>
    <div style="position:absolute;bottom:20%;left:6%;opacity:0.08;animation:float 9s ease-in-out infinite 2s;"><i class="fas fa-user-plus" style="font-size:2.5rem;color:var(--secondary);"></i></div>
    <div style="position:absolute;top:60%;right:8%;opacity:0.07;animation:float 6s ease-in-out infinite 1s;"><i class="fas fa-fingerprint" style="font-size:2rem;color:#fff;"></i></div>
  </div>

  <!-- Auth Card -->
  <div class="auth-card animate-on-scroll zoom-in" id="signup-card" style="max-width:480px;">
    <!-- Logo -->
    <a href="index.html" class="auth-logo" id="signup-logo" aria-label="SecureForce - Home">
      <svg width="36" height="36" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="signupSfGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="var(--logo-primary)"/>
            <stop offset="100%" stop-color="var(--logo-secondary)"/>
          </linearGradient>
        </defs>
        <path d="M50 8 L86 24 L86 52 C86 70 70 84 50 92 C30 84 14 70 14 52 L14 24 Z" fill="url(#signupSfGrad)" fill-opacity="0.15" stroke="url(#signupSfGrad)" stroke-width="3" stroke-linejoin="round"/>
        <path d="M50 18 L78 31 L78 52 C78 66 66 78 50 85 C34 78 22 66 22 52 L22 31 Z" fill="url(#signupSfGrad)" fill-opacity="0.08"/>
        <path d="M38 50 L46 58 L64 40" stroke="url(#signupSfGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="auth-logo-text">Secure<span>Force</span></span>
    </a>

    <h1 class="auth-title">Create Account</h1>
    <p class="auth-subtitle">Join SecureForce — Get access to your security portal</p>

    <form class="auth-form" id="signup-form" onsubmit="event.preventDefault();window.location.href='index.html';">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div class="form-group">
          <label class="form-label" for="signup-fname">First Name</label>
          <input type="text" id="signup-fname" class="form-input" placeholder="Rajesh" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="signup-lname">Last Name</label>
          <input type="text" id="signup-lname" class="form-input" placeholder="Kumar" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="signup-email">Email Address</label>
        <input type="email" id="signup-email" class="form-input" placeholder="you@company.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="signup-phone">Phone Number</label>
        <input type="tel" id="signup-phone" class="form-input" placeholder="+91 98765 43210" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="signup-org">Organization Name</label>
        <input type="text" id="signup-org" class="form-input" placeholder="ABC Pvt. Ltd. / Green Valley Apts." required>
      </div>
      <div class="form-group">
        <label class="form-label" for="signup-password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="signup-password" class="form-input" placeholder="Create a strong password" required>
          <button type="button" class="toggle-password" aria-label="Toggle password visibility"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="signup-confirm">Confirm Password</label>
        <div class="input-wrapper">
          <input type="password" id="signup-confirm" class="form-input" placeholder="Repeat your password" required>
          <button type="button" class="toggle-password" aria-label="Toggle confirm password visibility"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>
      <div style="margin-bottom:20px;">
        <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:0.83rem;color:rgba(255,255,255,0.6);line-height:1.5;">
          <input type="checkbox" id="signup-terms" style="accent-color:var(--secondary);margin-top:2px;flex-shrink:0;" required>
          I agree to the <a href="#" style="color:var(--secondary);font-weight:600;margin:0 2px;">Terms of Service</a> and <a href="#" style="color:var(--secondary);font-weight:600;margin:0 2px;">Privacy Policy</a>
        </label>
      </div>
      <button type="submit" class="btn btn-gold btn-full btn-shine" id="signup-submit-btn">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </form>

    <div class="auth-divider">or sign up with</div>

    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn-social" id="signup-google">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
      <button class="btn-social" id="signup-apple">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        Continue with Apple
      </button>
      <button class="btn-social" id="signup-linkedin">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#0A66C2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        Continue with LinkedIn
      </button>
    </div>

    <p class="auth-footer-text">Already have an account? <a href="login.html" id="signup-login-link">Sign in here</a></p>
  </div>
</div>

<style>
@keyframes float { 0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);} }
</style>
<script src="script.js"></script>
</body>
</html>
